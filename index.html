<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Task Manager</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <h1>Task Manager</h1>
    <section id="taskApp">
      <form action="secretary.html" id="taskForm">
        <input
          type="text"
          name="taskInput"
          id="taskInput"
          placeholder="Add a new task..."
          required
        />
        <button type="submit">Add</button>
      </form>

      <ul id="taskList"></ul>
    </section>
    <script src="index.js"></script>
  </body>
</html>
